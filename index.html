<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <title>Frontend Mentor | NFT preview card component</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <article class="card">
        <a href="#" class="img-container">
           <img
            id="main-img"
            src="images/image-equilibrium.jpg"
            alt="card-main-image"
          />
          <div class="overlay">
            <img src="images/icon-view.svg" alt="" />
          </div>
        </a>

        <div class="card-info">
          <a href="#" class="title-link"><h2 class="h2">Equilibrium #3429</h2></a>
          <p>Our Equilibrium collection promotes balance and calm.</p>
          <div class="stats">
            <div class="left-stats">
              <img src="images/icon-ethereum.svg" alt="symbol of eth" />
              <span>0.041 ETH</span>
            </div>
            <div class="right-stats">
              <img src="images/icon-clock.svg" alt="clock-symbol" />

              <span>3 days left</span>
            </div>
          </div>
        </div>

        <div class="avatar-info">
          <img src="images/image-avatar.png" alt="avatar picture" />
          <p>Creation of <a href="#" id="avatar-name">Jules Wyvern</a></p>
        </div>
       
      </article>
    </main>
    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Your Name Here</a>.
    </footer>
  </body>
</html>
